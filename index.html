<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miles Man CRM</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#fff;color:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;font-size:14px}
*{box-sizing:border-box}
#app{display:flex;height:100vh}
#sidebar{width:210px;background:#f7f7f8;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;flex-shrink:0}
.logo-area{padding:18px 16px 14px;border-bottom:1px solid #e0e0e0}
.logo-tag{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#2563eb;margin-bottom:2px}
.logo-name{font-size:17px;font-weight:700;color:#111}
.logo-sub{font-size:11px;color:#888;margin-top:3px}
nav{padding:10px 8px;flex:1}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border-radius:8px;border:none;background:transparent;color:#555;cursor:pointer;font-size:13px;font-family:inherit;text-align:left;margin-bottom:2px}
.nb:hover{background:#ebebed}
.nb.active{background:#dbeafe;color:#1d4ed8;font-weight:600}
.nc{margin-left:auto;font-size:10px;background:#e5e7eb;color:#555;border-radius:20px;padding:1px 7px}
.nb.active .nc{background:#bfdbfe;color:#1d4ed8}
.sb-footer{padding:12px;border-top:1px solid #e0e0e0;flex-shrink:0}
.sync-btn{width:100%;padding:7px;border-radius:7px;border:1px solid #d1d5db;background:#fff;color:#2563eb;cursor:pointer;font-size:12px;font-family:inherit;margin-bottom:6px}
.sync-btn.synced{color:#059669;border-color:#6ee7b7;background:#f0fdf4}
.io-row{display:flex;gap:5px;margin-bottom:8px}
.io-btn{flex:1;padding:6px;border-radius:6px;border:1px solid #e0e0e0;background:#fff;color:#555;cursor:pointer;font-size:11px;font-family:inherit}
.note-entry{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.note-entry:last-child{border-bottom:none;margin-bottom:0}
.note-ts{font-size:10px;font-weight:600;color:#2563eb;margin-bottom:4px;letter-spacing:.03em}
.note-txt{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #e5e7eb;font-size:13px;font-family:inherit;color:#111;background:#fff;resize:vertical;box-sizing:border-box}
.note-ts-link{cursor:pointer;text-decoration:underline;color:#2563eb;font-size:10px;font-weight:600;letter-spacing:.03em;}
.note-type-sel{font-size:11px;padding:2px 6px;border-radius:5px;border:1px solid #d1d5db;background:#fff;color:#374151;font-family:inherit;cursor:pointer;margin-left:8px;}
.note-type-badge{display:inline-block;padding:1px 8px;border-radius:12px;font-size:10px;font-weight:600;margin-left:8px;vertical-align:middle;}
.nt-email-sent{background:#dbeafe;color:#1e40af;}
.nt-email-received{background:#d1fae5;color:#065f46;}
.nt-initial-call{background:#fef3c7;color:#92400e;}
.nt-follow-up{background:#f3e8ff;color:#6b21a8;}
.nt-general{background:#f3f4f6;color:#374151;}
.nt-text-message{background:#fce7f3;color:#9d174d;}
.nt-lead{background:#fef9c3;color:#713f12;}
.nt-blue{background:#dbeafe;color:#1e40af;}
.note-ts-link:hover{color:#1d4ed8}
#note-expand-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
#note-expand-overlay.open{display:flex}
#note-expand-box{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:780px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
#note-expand-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-shrink:0}
#note-expand-ts{font-size:13px;font-weight:600;color:#2563eb}
#note-expand-close{background:none;border:none;cursor:pointer;color:#888;font-size:22px;line-height:1;font-family:inherit}
#note-expand-body{flex:1;overflow-y:auto;font-size:14px;color:#111;line-height:1.7;white-space:pre-wrap;word-break:break-word;border:1px solid #e5e7eb;border-radius:8px;padding:16px;background:#fafafa}
.footer-txt{font-size:10px;color:#aaa}

/* ── Mobile nav ── */
#mobile-nav-toggle{display:none;position:fixed;top:12px;left:12px;z-index:1200;background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:18px;cursor:pointer;line-height:1}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1100}

@media(max-width:700px){
  #mobile-nav-toggle{display:block}
  #sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:1150;transition:left .2s ease;box-shadow:4px 0 20px rgba(0,0,0,.15);overflow-y:auto}
  #sidebar.open{left:0}
  #sidebar-overlay.open{display:block}
  #main{padding:56px 14px 80px;width:100%}
  #app{flex-direction:column}

  /* Stack tables on mobile */
  table,thead,tbody,th,td,tr{display:block}
  thead tr{display:none}
  td{padding:4px 8px;font-size:13px;border-bottom:none}
  td:before{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;display:block;margin-bottom:1px}
  tr{border:1px solid #e5e7eb;border-radius:8px;margin-bottom:8px;padding:8px;background:#fff}

  /* Client table mobile labels */
  .tbl-wrap table tr td:nth-child(1):before{content:'Client'}
  .tbl-wrap table tr td:nth-child(2):before{content:'Contact'}
  .tbl-wrap table tr td:nth-child(3):before{content:'Tier'}
  .tbl-wrap table tr td:nth-child(4):before{content:'Points'}
  .tbl-wrap table tr td:nth-child(5):before{content:'Trips'}
  .tbl-wrap table tr td:nth-child(6):before{content:'Notes'}
  .tbl-wrap table tr td:nth-child(7):before{content:'Joined'}

  /* Stats grid 2 col on mobile */
  .stats-grid{grid-template-columns:repeat(2,1fr)}

  /* Two col becomes one col */
  .two-col{grid-template-columns:1fr}
  .email-two-col{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}
  .full{grid-column:1}

  /* Modal full screen */
  .modal{width:100%;max-height:95vh;border-radius:12px 12px 0 0;position:fixed;bottom:0;left:0;right:0}
  .overlay{align-items:flex-end}

  /* Page header stack */
  .page-hdr{flex-direction:column;align-items:flex-start;gap:10px}

  /* Calendar */
  .cal-grid{gap:1px}
  .cal-cell{min-height:50px;padding:2px}
  .cal-trip{font-size:9px;padding:1px 3px}
  .cal-month-label{font-size:13px;min-width:120px}
  .cal-nav-btn{padding:4px 8px;font-size:12px}

  /* Search row stack */
  .search-row{flex-direction:column}

  /* Report filter stack */
  .report-filter{flex-direction:column}
  .report-filter input,.report-filter select{width:100%}
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal-header-cell{text-align:center;font-size:11px;font-weight:700;color:#888;padding:6px 0;text-transform:uppercase;letter-spacing:.05em}
.cal-cell{min-height:80px;border:1px solid #e5e7eb;border-radius:6px;padding:4px;background:#fff;vertical-align:top}
.cal-cell.today{background:#eff6ff;border-color:#93c5fd}
.cal-cell.other-month{background:#f9f9f9;opacity:.6}
.cal-day-num{font-size:11px;font-weight:600;color:#888;margin-bottom:3px}
.cal-day-num.today-num{background:#2563eb;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px}
.cal-trip{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.cal-trip-start{background:#dbeafe;color:#1e40af;border-left:3px solid #2563eb}
.template-card{border:1px solid #e5e7eb;border-radius:8px;padding:12px 16px;cursor:pointer;margin-bottom:8px;transition:border-color .15s}
.template-card:hover,.template-card.selected{border-color:#2563eb;background:#eff6ff}
.template-card-name{font-size:13px;font-weight:600;color:#111}
.template-card-desc{font-size:11px;color:#888;margin-top:2px}
.email-preview{border:1px solid #e5e7eb;border-radius:8px;padding:16px;background:#fafafa;font-size:13px;line-height:1.7;white-space:pre-wrap;min-height:120px;color:#111}
.email-two-col{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
.vendor-card{border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:10px;background:#fff}
.vendor-card:hover{border-color:#2563eb;box-shadow:0 2px 8px rgba(37,99,235,.08)}
.vendor-type-supplier{background:#dbeafe;color:#1e40af}
.vendor-type-referral{background:#d1fae5;color:#065f46}
.vendor-stat{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#555;background:#f3f4f6;border-radius:6px;padding:3px 10px;margin-right:6px;margin-top:6px}
.cal-trip-end{background:#d1fae5;color:#065f46;border-left:3px solid #059669}
.cal-trip-span{background:#f3f4f6;color:#374151;border-left:3px solid #9ca3af}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-nav-btn{padding:6px 14px;border-radius:7px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;color:#374151}
.cal-nav-btn:hover{background:#f3f4f6}
.cal-month-label{font-size:16px;font-weight:700;color:#111;min-width:160px;text-align:center}
.report-filter{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:flex-end}
.report-filter label{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.report-filter input,.report-filter select{padding:8px 11px;border-radius:7px;border:1px solid #d1d5db;font-size:13px;font-family:inherit;color:#111;background:#fafafa}
.report-run-btn{padding:9px 18px;border-radius:8px;border:none;background:#2563eb;color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.report-export-btn{padding:9px 18px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;font-size:13px;font-family:inherit}
.report-table{width:100%;border-collapse:collapse;margin-top:4px}
.report-table th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:#888;border-bottom:1px solid #e5e7eb;text-transform:uppercase;letter-spacing:.05em}
.report-table td{padding:10px 12px;font-size:13px;color:#444;border-bottom:1px solid #f0f0f0;vertical-align:top}
.report-table td.note-cell{max-width:500px;white-space:pre-wrap;word-break:break-word;line-height:1.5}
#main{flex:1;overflow-y:auto;padding:24px 28px;background:#fff}
.page-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-title{font-size:22px;font-weight:700;color:#111}
.add-btn{padding:9px 18px;border-radius:8px;border:none;background:#2563eb;color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat{background:#f7f7f8;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px}
.stat-lbl{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:700;color:#111}
.two-col{display:grid;grid-template-columns:1.5fr 1fr;gap:14px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;color:#111}
.view-all{font-size:12px;color:#2563eb;background:none;border:none;cursor:pointer;font-family:inherit}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:#888;border-bottom:1px solid #e5e7eb;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
td{padding:10px 12px;font-size:13px;color:#444;border-bottom:1px solid #f0f0f0;vertical-align:middle}
td.n{color:#111;font-weight:600}
tr:last-child td{border-bottom:none}
.tbl-wrap{border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-green{background:#d1fae5;color:#065f46}
.b-amber{background:#fef3c7;color:#92400e}
.b-blue{background:#dbeafe;color:#1e40af}
.b-red{background:#fee2e2;color:#991b1b}
.b-gray{background:#f3f4f6;color:#374151}
.av{width:30px;height:30px;border-radius:50%;background:#dbeafe;color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.search-row{display:flex;gap:8px;margin-bottom:14px}
.search-row input,.search-row select{padding:8px 12px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;font-family:inherit;color:#111;background:#fff}
.search-row input{flex:1}
.cli-row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;margin-bottom:3px}
.cli-row:hover{background:#f7f7f8}
.trips-btn{padding:3px 10px;border-radius:20px;border:1px solid #d1d5db;background:#fff;color:#2563eb;cursor:pointer;font-size:11px;font-family:inherit}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:5px;font-size:15px}
.back-btn{background:none;border:none;color:#888;cursor:pointer;font-size:12px;font-family:inherit;padding:0;margin-top:3px;display:block}
.empty{padding:32px;text-align:center;color:#aaa;font-size:13px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:999}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:26px;width:620px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:700;color:#111}
.close-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;font-family:inherit;line-height:1}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
.full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{padding:8px 11px;border-radius:7px;border:1px solid #d1d5db;font-size:13px;font-family:inherit;color:#111;background:#fafafa}
.field textarea{resize:vertical;min-height:58px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.cancel-btn{padding:9px 20px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#555;cursor:pointer;font-family:inherit;font-size:13px}
.save-btn{padding:9px 20px;border-radius:8px;border:none;background:#2563eb;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
#toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:1100;display:none}
.t-ok{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.t-err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.t-info{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
</style>
</head>
<body>
<button id="mobile-nav-toggle">&#9776;</button>
<div id="sidebar-overlay"></div>
<div id="app">
  <div id="sidebar">
    <div class="logo-area">
      <div class="logo-tag">&#9992; Miles Man</div>
      <div class="logo-name">Client CRM</div>
      <div class="logo-sub" id="sync-lbl">&#9679; Saved locally</div>
    </div>
    <nav>
      <button class="nb active" id="nb-dashboard">&#128202; Dashboard</button>
      <button class="nb" id="nb-clients">&#128100; Clients <span class="nc" id="nc-clients">0</span></button>
      <button class="nb" id="nb-trips">&#9992;&#65039; Trips <span class="nc" id="nc-trips">0</span></button>
      <button class="nb" id="nb-vendors">&#127981; Suppliers <span class="nc" id="nc-vendors">0</span></button>
      <button class="nb" id="nb-reports">&#128202; Reports</button>
      <button class="nb" id="nb-calendar">&#128197; Calendar</button>
      <button class="nb" id="nb-email">&#9993;&#65039; Email</button>
    </nav>
    <div class="sb-footer">
      <button class="sync-btn" id="outlook-btn">&#128424; Sync Outlook Emails</button>
      <button class="sync-btn" id="drive-btn" style="color:#1a73e8;border-color:#93c5fd">&#9729; Backup to Google Drive</button>
      <button class="sync-btn" id="drive-restore-btn" style="color:#1a73e8;border-color:#93c5fd">&#9729; Restore from Google Drive</button>
      <div class="io-row">
        <button class="io-btn" id="btn-clients-csv">&#11015; Clients CSV</button>
        <button class="io-btn" id="btn-trips-csv">&#11015; Trips CSV</button>
      </div>
      <div class="io-row">
        <button class="io-btn" id="btn-backup">&#11015; Backup</button>
        <button class="io-btn" id="btn-restore">&#11014; Restore</button>
      </div>
      <button class="sync-btn" id="btn-mass-email" style="color:#7c3aed;border-color:#c4b5fd">&#128231; Email All Clients</button>
      <button class="sync-btn" id="btn-import-csv" style="color:#059669;border-color:#6ee7b7">&#128203; Import Contacts from CSV</button>
      <button class="sync-btn" id="btn-import-revenue" style="color:#059669;border-color:#6ee7b7">&#128178; Import Revenue CSV</button>
      <button class="sync-btn" id="btn-clear-trips" style="color:#dc2626;border-color:#fca5a5">&#128465; Clear All Trips</button>
      <button class="sync-btn" id="btn-import-suppliers-sb" style="color:#059669;border-color:#6ee7b7">&#127981; Import Suppliers CSV</button>
      <button class="sync-btn" id="btn-undo" disabled style="color:#7c3aed;border-color:#c4b5fd;opacity:.4" title="Nothing to undo">&#8630; Undo</button>
      <button class="sync-btn" id="btn-drive-signout" style="color:#888;border-color:#ddd;font-size:11px">&#9729;&#65039; Reset Drive Login</button>
      <button class="sync-btn" id="btn-ms-signout" style="color:#888;border-color:#ddd;font-size:11px">&#128274; Reset Outlook Login</button>
      <button class="sync-btn" id="btn-debug-toggle" style="color:#888;border-color:#ddd;font-size:11px">&#128030; Debug Panel</button>
      <div class="footer-txt">(908) 419-7700 &middot; themilesman.com</div>
    </div>
  </div>
  <div id="main"></div>
</div>
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>
<div id="toast"></div>



  <div id="debug-panel" style="display:none;position:fixed;bottom:0;left:0;right:0;height:200px;background:#1a1a2e;color:#00ff88;font-family:monospace;font-size:11px;padding:10px;overflow-y:auto;z-index:2000;border-top:2px solid #00ff88">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <strong>Debug Log</strong>
      <button id="debug-clear" style="background:none;border:1px solid #00ff88;color:#00ff88;cursor:pointer;font-size:10px;padding:2px 8px;border-radius:4px">Clear</button>
      <button id="debug-close" style="background:none;border:1px solid #ff4444;color:#ff4444;cursor:pointer;font-size:10px;padding:2px 8px;border-radius:4px">Close</button>
    </div>
    <div id="debug-log"></div>
  </div>
<div id="import-match-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px">
  <div id="import-match-box" style="background:#fff;border-radius:12px;padding:26px;width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)">
    <div style="font-size:17px;font-weight:700;color:#111;margin-bottom:6px">Unmatched Client</div>
    <div id="import-match-name" style="font-size:14px;color:#555;margin-bottom:16px"></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button id="import-match-add" style="padding:10px 16px;border-radius:8px;border:none;background:#2563eb;color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;text-align:left">+ Add as new client</button>
      <div style="font-size:12px;color:#888;margin-top:4px">— or match to existing client —</div>
      <select id="import-match-sel" style="padding:9px 12px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;font-family:inherit;color:#111">
        <option value="">Select existing client...</option>
      </select>
      <button id="import-match-use" style="padding:10px 16px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#374151;cursor:pointer;font-size:13px;font-family:inherit">Match to selected client</button>
      <button id="import-match-skip" style="padding:8px 16px;border-radius:8px;border:none;background:none;color:#888;cursor:pointer;font-size:12px;font-family:inherit">Skip this row</button>
    </div>
  </div>
</div>

function toLastFirst(name){
  if(!name) return '';
  name = name.trim();
  if(name.includes(',')) return name; // already in Last, First format
  var parts = name.split(/\s+/);
  if(parts.length < 2) return name;
  var first = parts.slice(0,-1).join(' ');
  var last = parts[parts.length-1];
  return last+', '+first;
}
function toFirstLast(name){
  if(!name) return '';
  name = name.trim();
  if(!name.includes(',')) return name;
  var parts = name.split(',').map(function(s){return s.trim();});
  return parts[1]+' '+parts[0];
}
function getLastName(name){
  if(!name) return '';
  if(name.includes(',')) return name.split(',')[0].trim();
  var parts = name.trim().split(/\s+/);
  return parts[parts.length-1];
}
function getFirstName(name){
  if(!name) return '';
  if(name.includes(',')){
    var parts = name.split(',').map(function(s){return s.trim();});
    return parts[1]||'';
  }
  var parts = name.trim().split(/\s+/);
  return parts[0];
}
function extractDateFromText(text){
  if(!text) return '';
  // Match patterns like 7/19/26, 12/27/25, 5/29/26
  var m = text.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(!m) return '';
  var mo=parseInt(m[1],10), da=parseInt(m[2],10), yr=parseInt(m[3],10);
  if(yr<100) yr += 2000;
  if(mo<1||mo>12||da<1||da>31) return '';
  return yr+'-'+String(mo).padStart(2,'0')+'-'+String(da).padStart(2,'0');
}
function countDistinctTrips(clientId){
  var trips = db.trips.filter(function(t){return t.clientId===clientId;});
  var seen = {};
  var count = 0;
  trips.forEach(function(t){
    var key = t.invoiceNum || t.id; // fall back to trip id if no invoice number
    if(!seen[key]){ seen[key]=true; count++; }
  });
  return count;
}

}

// ── Microsoft Outlook ─────────────────────────────────────────────────────
function getMsToken(){ return localStorage.getItem('mm_ms_token'); }
function msTokenValid(){
  const exp=parseInt(localStorage.getItem('mm_ms_expiry')||'0',10);
  return !!getMsToken()&&Date.now()<exp;
}
// ── PKCE helpers ─────────────────────────────────────────────────────────
async function generateCodeVerifier(){
  const array = new Uint8Array(32);
  window.crypto.getRandomValues(array);
  return btoa(String.fromCharCode.apply(null, array))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generateCodeChallenge(verifier){
  const encoder = new TextEncoder();
  const data = encoder.encode(verifier);
  const digest = await window.crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function msLogin(){
  const verifier = await generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  localStorage.setItem('mm_pkce_verifier', verifier);
  debugLog('PKCE verifier generated, redirecting...');
  const params=new URLSearchParams({
    client_id:MS_CLIENT_ID,response_type:'code',redirect_uri:MS_REDIRECT,
    scope:MS_SCOPE,response_mode:'query',state:'outlooksync',
    code_challenge:challenge,code_challenge_method:'S256'
  });
  window.location.href='https://login.microsoftonline.com/'+MS_TENANT_ID+'/oauth2/v2.0/authorize?'+params.toString();
}
async function exchangeCodeForToken(code){
  debugLog('Calling auth server (secure token exchange)...');
  const verifier = localStorage.getItem('mm_pkce_verifier')||'';
  debugLog('PKCE verifier found: '+(verifier?'yes ('+verifier.slice(0,10)+'...)':'NO - missing!'));
  const r=await fetch(MS_AUTH_SERVER+'/api/token',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      grant_type:'authorization_code',
      code:code,
      redirect_uri:MS_REDIRECT,
      code_verifier:verifier
    })
  });
  const d=await r.json();
  debugLog('Token response status: '+r.status+' error: '+(d.error||'none')+' desc: '+(d.error_description||'').slice(0,80));
  if(!r.ok) throw new Error(d.error_description||d.error||'Token exchange failed');
  localStorage.setItem('mm_ms_token',d.access_token);
  localStorage.setItem('mm_ms_expiry',String(Date.now()+(d.expires_in-60)*1000));
  if(d.refresh_token) localStorage.setItem('mm_ms_refresh',d.refresh_token);
  return d.access_token;
}
async function refreshMsToken(){
  const rt=localStorage.getItem('mm_ms_refresh');
  if(!rt) throw new Error('No refresh token');
  const r=await fetch(MS_AUTH_SERVER+'/api/token',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({grant_type:'refresh_token',refresh_token:rt})
  });
  const d=await r.json();
  if(!r.ok) throw new Error(d.error_description||'Refresh failed');
  localStorage.setItem('mm_ms_token',d.access_token);
  localStorage.setItem('mm_ms_expiry',String(Date.now()+(d.expires_in-60)*1000));
  if(d.refresh_token) localStorage.setItem('mm_ms_refresh',d.refresh_token);
  return d.access_token;
}
async function getValidMsToken(autoRedirect){
  if(msTokenValid()) return getMsToken();
  const rt = localStorage.getItem('mm_ms_refresh');
  if(rt){
    try{ return await refreshMsToken(); }
    catch(e){
      debugLog('Refresh failed, clearing tokens');
      localStorage.removeItem('mm_ms_token');
      localStorage.removeItem('mm_ms_refresh');
      localStorage.removeItem('mm_ms_expiry');
    }
  }
  // Only redirect if explicitly requested (user clicked sync)
  if(autoRedirect){
    debugLog('Redirecting to Microsoft login...');
    msLogin(); // async - starts PKCE flow
  }
  return null;
}
async function fetchEmails(token,clientEmail,lastSyncDate){
  const results = [];
  const clientLower = clientEmail.toLowerCase();

  // Only fetch last 90 days unless we have a lastSync date
  const since = lastSyncDate || (function(){
    const d = new Date();
    d.setDate(d.getDate()-90);
    return d.toISOString();
  })();

  debugLog('Fetching emails since: '+since.slice(0,10));

  // Fetch inbox - single page of 50, filtered by date
  try{
    const sinceParam = encodeURIComponent(since);
    const u1 = 'https://graph.microsoft.com/v1.0/me/messages'+
      '?$select=subject,receivedDateTime,from,toRecipients,body,isDraft'+
      '&$orderby=receivedDateTime desc&$top=50'+
      '&$filter=receivedDateTime+ge+'+sinceParam;
    debugLog('Fetching inbox for '+clientEmail+'...');
    const r1 = await fetch(u1,{headers:{Authorization:'Bearer '+token}});
    const d1 = await r1.json();
    debugLog('Inbox: status='+r1.status+' count='+((d1.value||[]).length));
    if(r1.ok && d1.value){
      const matched = d1.value.filter(function(m){
        const from=(m.from&&m.from.emailAddress&&m.from.emailAddress.address||'').toLowerCase();
        const to=(m.toRecipients||[]).map(function(r){return(r.emailAddress&&r.emailAddress.address||'').toLowerCase();});
        return from===clientLower||to.indexOf(clientLower)>=0;
      });
      debugLog('Inbox matched: '+matched.length);
      results.push.apply(results,matched);
    } else { debugLog('Inbox error: '+(d1.error&&d1.error.message||'unknown')); }
  }catch(e){ debugLog('Inbox error: '+e.message); }

  // Fetch sent items - single page of 50, filtered by date
  try{
    const sinceParam = encodeURIComponent(since);
    const u2 = 'https://graph.microsoft.com/v1.0/me/mailFolders/SentItems/messages'+
      '?$select=subject,receivedDateTime,from,toRecipients,body,isDraft'+
      '&$orderby=receivedDateTime desc&$top=50'+
      '&$filter=receivedDateTime+ge+'+sinceParam;
    debugLog('Fetching sent for '+clientEmail+'...');
    const r2 = await fetch(u2,{headers:{Authorization:'Bearer '+token}});
    const d2 = await r2.json();
    debugLog('Sent: status='+r2.status+' count='+((d2.value||[]).length));
    if(r2.ok && d2.value){
      const matched = d2.value.filter(function(m){
        const to=(m.toRecipients||[]).map(function(r){return(r.emailAddress&&r.emailAddress.address||'').toLowerCase();});
        return to.indexOf(clientLower)>=0;
      });
      debugLog('Sent matched: '+matched.length);
      results.push.apply(results,matched);
    } else { debugLog('Sent error: '+(d2.error&&d2.error.message||'unknown')); }
  }catch(e){ debugLog('Sent error: '+e.message); }

  debugLog('Total for '+clientEmail+': '+results.length);
  return results;
}
function stripHtml(html){
  return (html||'')
    .replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
    .replace(/<[^>]+>/g,' ')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/\s+/g,' ').trim();
}
function emailToNote(msg){
  const dt=new Date(msg.receivedDateTime);
  const ts=dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  const isSent=(msg.from&&msg.from.emailAddress&&msg.from.emailAddress.address||'').toLowerCase().includes('themilesman');
  const dir=isSent?'Sent':'Received';
  const noteType=isSent?'Email Sent':'Email Received';
  const subj=msg.subject||'(no subject)';
  const body=msg.body?stripHtml(msg.body.content||''):(msg.bodyPreview||'');
  return {ts:ts,text:dir+': '+subj+(body?'\n'+body:''),source:'outlook',msgId:msg.id,noteType:noteType};
}
async function syncOutlook(){
  const btn=$('outlook-btn');
  const orig=btn.textContent;
  btn.textContent='Syncing...'; btn.disabled=true;
  debugLog('=== Outlook Sync Started ===');
  try{
    let token=await getValidMsToken(true);
    if(!token){
      debugLog('Redirecting to login...');
      btn.textContent=orig;btn.disabled=false;return;
    }
    debugLog('Got token: '+token.slice(0,20)+'...');
    toast('Connected - fetching emails...','info');

    const clients=db.clients.filter(c=>c.email&&c.email.includes('@'));
    debugLog('Clients with email: '+clients.length+' ('+clients.map(c=>c.email).join(', ')+')');
    if(!clients.length){
      toast('Add clients with email addresses first','err');
      btn.textContent=orig;btn.disabled=false;return;
    }

    // Clear last sync date to fetch all emails
    const lastSync=null; // fetch everything
    debugLog('Fetching ALL emails (no date filter)');

    let totalNew=0;
    for(const client of clients){
      debugLog('--- Fetching emails for: '+client.email+' ---');
      try{
        const emails=await fetchEmails(token,client.email,lastSync);
        debugLog('Emails returned for '+client.email+': '+emails.length);
        if(!emails.length){debugLog('No emails found for '+client.email);continue;}

        emails.slice(0,3).forEach(function(m){
          debugLog('  Email: "'+m.subject+'" from '+m.from.emailAddress.address+' on '+m.receivedDateTime);
        });

        const existing=new Set((client.notesLog||[]).filter(n=>n.msgId).map(n=>n.msgId));
        debugLog('Existing logged email IDs: '+existing.size);
        const newNotes=emails.filter(m=>!existing.has(m.id)&&!m.isDraft).map(emailToNote);
        debugLog('New notes to add: '+newNotes.length);

        if(newNotes.length){
          const notesLog=[...(client.notesLog||[]),...newNotes].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
          db.clients=db.clients.map(c=>c.id===client.id?Object.assign({},c,{notesLog:notesLog}):c);
          totalNew+=newNotes.length;
        }
      }catch(e){
        debugLog('ERROR for '+client.email+': '+e.message);
        console.error('Email fetch error for '+client.email,e);
      }
    }
    localStorage.setItem('mm_last_outlook_sync',new Date().toISOString());
    saveDB();render();
    btn.textContent=orig;btn.style.color='#059669';btn.style.borderColor='#6ee7b7';
    debugLog('=== Sync Complete: '+totalNew+' new emails ===');
    toast(totalNew?'Synced '+totalNew+' new emails':'No new emails found','ok');
  }catch(e){
    debugLog('FATAL ERROR: '+e.message);
    console.error('Outlook sync error:',e);
    toast('Sync failed: '+e.message,'err');
    btn.textContent=orig;
  }
  btn.disabled=false;
}

// ── Google Drive Auth (PKCE via Vercel server) ───────────────────────────
async function getDriveToken(){
  // Return cached token if still valid
  const stored = localStorage.getItem('mm_drive_token');
  const expiry = parseInt(localStorage.getItem('mm_drive_expiry')||'0',10);
  if(stored && Date.now() < expiry) return stored;

  // Try refresh token
  const rt = localStorage.getItem('mm_drive_refresh');
  if(rt){
    try{
      const r = await fetch(DRIVE_AUTH_SERVER+'/api/drive-token',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({grant_type:'refresh_token',refresh_token:rt})
      });
      const d = await r.json();
      if(r.ok && d.access_token){
        localStorage.setItem('mm_drive_token', d.access_token);
        localStorage.setItem('mm_drive_expiry', String(Date.now()+(d.expires_in-60)*1000));
        if(d.refresh_token) localStorage.setItem('mm_drive_refresh', d.refresh_token);
        return d.access_token;
      }
    }catch(e){ debugLog('Drive refresh failed: '+e.message); }
    localStorage.removeItem('mm_drive_refresh');
  }

  // Need fresh login - use PKCE redirect flow
  await driveLogin();
  return null;
}

async function driveLogin(){
  const verifier = await generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  localStorage.setItem('mm_drive_pkce', verifier);
  localStorage.setItem('mm_drive_action', 'pending'); // remember to continue after redirect
  const params = new URLSearchParams({
    client_id:            DRIVE_CLIENT_ID,
    redirect_uri:         DRIVE_REDIRECT,
    response_type:        'code',
    scope:                DRIVE_SCOPE,
    state:                'drive_auth',
    code_challenge:       challenge,
    code_challenge_method:'S256',
    access_type:          'offline',
    prompt:               'consent'
  });

}

function checkDriveRedirect(){
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const state = params.get('state');
  if(!code || state !== 'drive_auth') return;

  window.history.replaceState({},'',window.location.pathname);
  const verifier = localStorage.getItem('mm_drive_pkce')||'';
  debugLog('Drive auth code received, exchanging...');

  fetch(DRIVE_AUTH_SERVER+'/api/drive-token',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      grant_type:    'authorization_code',
      code:          code,
      redirect_uri:  DRIVE_REDIRECT,
      code_verifier: verifier
    })
  }).then(function(r){return r.json();}).then(function(d){
    if(d.access_token){
      localStorage.setItem('mm_drive_token',   d.access_token);
      localStorage.setItem('mm_drive_expiry',  String(Date.now()+(d.expires_in-60)*1000));
      if(d.refresh_token) localStorage.setItem('mm_drive_refresh', d.refresh_token);
      localStorage.removeItem('mm_drive_pkce');
      driveToken = d.access_token;
      debugLog('Drive token obtained successfully');
      toast('Google Drive connected!','ok');
      // Auto-trigger pending action
      var action = localStorage.getItem('mm_drive_action');
      localStorage.removeItem('mm_drive_action');
      if(action==='backup') driveBackup();
      else if(action==='restore') driveRestore();
    } else {
      debugLog('Drive token exchange failed: '+(d.error||'unknown'));
      toast('Google Drive auth failed: '+(d.error_description||d.error),'err');
    }
  }).catch(function(e){
    debugLog('Drive token exchange error: '+e.message);
    toast('Drive auth error: '+e.message,'err');
  });
}
async function findBackupFile(token){
  const q=encodeURIComponent("name='"+BACKUP_FILENAME+"' and trashed=false");
  const r=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name,modifiedTime)',{
    headers:{Authorization:'Bearer '+token}
  });
  const d=await r.json();
  return (d.files||[])[0]||null;
}
async function driveBackup(silent){
  const btn=$('drive-btn');

    const content=JSON.stringify(db,null,2);

      await fetch('https://www.googleapis.com/upload/drive/v3/files/'+existing.id+'?uploadType=media',{
        method:'PATCH',headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json'},body:content
      });
    }else{
      const meta=new Blob([JSON.stringify({name:BACKUP_FILENAME,mimeType:'application/json'})],{type:'application/json'});
      const data=new Blob([content],{type:'application/json'});
      const form=new FormData();form.append('metadata',meta);form.append('file',data);
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST',headers:{Authorization:'Bearer '+driveToken},body:form
      });
    }
    if(!silent){btn.textContent='Backed up to Drive';btn.style.color='#059669';btn.style.borderColor='#6ee7b7';}

function parseCSVLine(line){
  const result=[];let cur='',inQuote=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQuote=!inQuote;}
    else if(ch===','&&!inQuote){result.push(cur.trim());cur='';}
    else{cur+=ch;}
  }
  result.push(cur.trim());
  return result;
}

function importRevenue(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv';
  inp.onchange=function(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=function(ev){
      try{
        const lines=ev.target.result.split('\n').map(l=>l.trim()).filter(l=>l);
        if(lines.length<2){toast('File appears empty','err');return;}

        // Detect delimiter
        const delim = lines[0].includes('\t') ? '\t' : ',';
        const split = function(line){
          if(delim===',') return parseCSVLine(line); // handles quoted fields with commas
          return line.split(delim).map(function(c){return c.replace(/^"|"$/g,'').trim();});
        };

        // Detect header row
        const hdrs = split(lines[0]).map(function(h){return h.toLowerCase().trim();});
        const looksLikeHeader = hdrs.some(function(h){return ['name','date','amount','num','qty','memo','item'].includes(h);});
        const startRow = looksLikeHeader ? 1 : 0;

        // Column indices (header-based or positional)
        // Positional: col0=date, col1=invoice, col2=memo/description, col3=name/supplier,
        //             col4=product/class, col5=client(class), col6=qty, col7=price, col8=total
        function getCol(row, names, fallbackIdx){
          if(looksLikeHeader){
            for(var i=0;i<names.length;i++){
              var idx=hdrs.indexOf(names[i]);
              if(idx>=0) return (row[idx]||'').trim();
            }
            return '';
          }
          return (row[fallbackIdx]||'').trim();
        }

        const rows=[];
        for(var i=startRow;i<lines.length;i++){
          const cols=split(lines[i]);
          if(cols.length<3) continue;

          const date    = getCol(cols,['date'],0);
          const invoiceNum = getCol(cols,['num','invoice'],1);
          const memo    = getCol(cols,['memo','description'],2);
          const nameVal = getCol(cols,['name'],3);
          const shipDate= getCol(cols,['ship date','shipdate'],4);  // col4 = Ship Date (new) -> trip start date
          const classVal= getCol(cols,['item'],5);        // col5 = Item (was col4)
          const clientFromClass = getCol(cols,['class'],6) || (cols[6]||'').trim(); // col6 = Class (was col5)
          const amtStr  = getCol(cols,['amount','sales price'],9) ||
                          getCol(cols,['amount','sales price'],8) ||
                          cols[cols.length-1]||'';
          const amt     = parseFloat(amtStr.replace(/[$,"]/g,''))||0;

          if(!nameVal||amt===0) continue;

          // Check if nameVal matches a supplier
          const matchedSupplier = db.vendors.find(function(v){
            return (v.name||'').toLowerCase().trim()===nameVal.toLowerCase().trim();
          });

          var clientName, supplierId, supplierName, product;

          if(matchedSupplier){
            // nameVal IS a supplier — client must come from Class column (col5) ONLY
            var clientCol = clientFromClass || '';

            // If Class is blank, skip this row entirely (per rule)
            if(!clientCol){
              debugLog('Revenue skip: supplier='+matchedSupplier.name+' class field is blank');
              continue;
            }

            clientName    = clientCol;
            supplierId    = matchedSupplier.id;
            supplierName  = matchedSupplier.name;
            product       = classVal;
          } else {
            // nameVal IS the client name
            clientName   = nameVal;
            supplierId   = '';
            supplierName = '';
            product      = classVal;
            // Try to match supplier from classVal
            if(classVal){
              var prodParts = classVal.split(':');
              for(var pi=0;pi<prodParts.length;pi++){
                var seg = prodParts[pi].trim().toLowerCase();
                var sup = db.vendors.find(function(v){
                  var vl=(v.name||'').toLowerCase();
                  return vl===seg||vl.includes(seg)||seg.includes(vl);
                });
                if(sup){supplierId=sup.id;supplierName=sup.name;break;}
              }
            }
          }

          debugLog('Revenue row: name='+nameVal+' client='+clientName+' supplier='+supplierName+' amt='+amt);

          rows.push({
            name:clientName,
            isSupplierName:!!matchedSupplier,
            supplierName:supplierName,
            supplierId:supplierId,
            product:product,
            amt:amt,
            date:date,
            shipDate:shipDate,
            memo:memo,
            item:classVal,
            invoiceNum:invoiceNum
          });
        }

        if(!rows.length){toast('No valid rows found','err');return;}

        // Auto-match client names
        const unmatchedNames=[];
        const autoResolutions={};

        function fuzzyMatchClient(name){
          if(!name) return null;
          const nl=name.toLowerCase().trim();
          // Get first/last regardless of input format (handles 'Last, First' or 'First Last')
          const inputFirst=getFirstName(nl).toLowerCase();
          const inputLast=getLastName(nl).toLowerCase();
          // Exact match against stored 'Last, First' format
          var m=db.clients.find(c=>(c.name||'').toLowerCase().trim()===nl); if(m) return m;
          // Match by comparing first+last regardless of how input or stored name is formatted
          if(inputFirst && inputLast && inputFirst!==inputLast){
            m=db.clients.find(function(c){
              var cFirst=getFirstName(c.name).toLowerCase();
              var cLast=getLastName(c.name).toLowerCase();
              return cFirst===inputFirst && cLast===inputLast;
            });
            if(m) return m;
          }
          return null;
        }

        rows.forEach(function(row){
          if(autoResolutions[row.name]!==undefined||unmatchedNames.includes(row.name)) return;
          const matched=fuzzyMatchClient(row.name);
          if(matched){ autoResolutions[row.name]=matched.id; }
          else { unmatchedNames.push(row.name); }
        });

        window._importState={rows,unmatchedNames,resolutions:autoResolutions,cursor:0};
        processImportQueue();
      }catch(err){console.error(err);toast('Could not read CSV: '+err.message,'err');}
    };r.readAsText(f);
  };inp.click();
}

function processImportQueue(){
  const state=window._importState;
  if(!state)return;
  while(state.cursor<state.unmatchedNames.length){
    const name=state.unmatchedNames[state.cursor];
    if(state.resolutions[name]!==undefined){state.cursor++;continue;}
    showImportMatchModal(name);return;
  }
  finalizeImport();
}

function showImportMatchModal(name){
  const overlay=$('import-match-overlay');
  $('import-match-name').textContent='No client found matching: "'+name+'"';
  const sel=$('import-match-sel');
  const sorted=[...db.clients].sort((a,b)=>{
    const al=(a.name||'').trim().split(' ').pop().toLowerCase();
    const bl=(b.name||'').trim().split(' ').pop().toLowerCase();
    return al.localeCompare(bl);
  });
  sel.innerHTML='<option value="">Select existing client...</option>'+sorted.map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('');
  overlay.style.display='flex';

  $('import-match-add').onclick=function(){
    const newCid=newId('C',db.clients);
    db.clients.push({id:newCid,name:toLastFirst(name),email:'',phone:'',location:'',tier:'Standard',points:0,preferredAirline:'',preferredHotel:'',notesLog:[],joined:today(),totalTrips:0,totalRevenue:0});
    saveDB();
    window._importState.resolutions[name]=newCid;
    overlay.style.display='none';
    window._importState.cursor++;
    processImportQueue();
  };
  $('import-match-use').onclick=function(){
    const cid=sel.value;
    if(!cid){toast('Please select a client or skip','err');return;}
    window._importState.resolutions[name]=cid;
    overlay.style.display='none';
    window._importState.cursor++;
    processImportQueue();
  };
  $('import-match-skip').onclick=function(){
    window._importState.resolutions[name]=null;
    overlay.style.display='none';
    window._importState.cursor++;
    processImportQueue();
  };
}

function finalizeImport(){
  const state=window._importState;
  let imported=0,skipped=0,totalRev=0;
  state.rows.forEach(function(row){
    // Find client by name
    const cl=row.name.toLowerCase().trim();
    const parts=cl.split(/\s+/);
    const first=parts[0]||'';
    const last=parts[parts.length-1]||'';
    let cid=null;

    // Check resolution from match modal first
    if(state.resolutions[row.name]!==undefined){
      cid=state.resolutions[row.name];
    }

    // Get first/last regardless of format
    const rowFirst = getFirstName(cl);
    const rowLast = getLastName(cl);

    // Fuzzy match if no resolution — exact or both-names-match only
    if(!cid){
      const direct=db.clients.find(function(c){
        const fn=(c.name||'').toLowerCase().trim();
        if(fn===cl) return true;
        if(rowFirst&&rowLast&&rowFirst!==rowLast){
          var cFirst=getFirstName(c.name);
          var cLast=getLastName(c.name);
          if(cFirst===rowFirst && cLast===rowLast) return true;
        }
        return false;
      });
      if(direct) cid=direct.id;
    }

    if(!cid){debugLog('Revenue: no client match for '+row.name);skipped++;return;}

    const client=db.clients.find(c=>c.id===cid);
    if(!client){skipped++;return;}

    // Duplicate check
    const dupExists=db.trips.some(function(t){
      return t.clientId===cid &&
             t.supplierId===(row.supplierId||'') &&
             t.cashPaid===row.amt &&
             (t.departDate||'').slice(0,10)===(row.date?row.date.slice(0,10):today());
    });
    if(dupExists){debugLog('Revenue: duplicate skipped for '+client.name);skipped++;return;}

    // Build destination: use memo, or supplier+date, or 'Imported Trip'
    const tripId=newId('T',db.trips);
    const dest=row.memo||(row.supplierName?row.supplierName+(row.date?' '+row.date:''):'Imported Trip');
    // Use Ship Date column as trip start date if available, else fall back to extracted/invoice date
    let tripDate=today();
    if(row.shipDate){
      try{const d=new Date(row.shipDate);if(!isNaN(d))tripDate=d.toISOString().slice(0,10);}catch(e){}
    } else {
      var extractedDate = extractDateFromText(dest);
      if(extractedDate){
        tripDate = extractedDate;
      } else if(row.date){
        try{const d=new Date(row.date);if(!isNaN(d))tripDate=d.toISOString().slice(0,10);}catch(e){}
      }
    }

    db.trips.push({
      id:tripId,clientId:cid,clientName:client.name,
      destination:dest,origin:'',departDate:tripDate,returnDate:tripDate,
      status:'Completed',type:'Leisure',airline:'',flightClass:'',hotel:'',
      hotelNights:0,pointsUsed:0,cashPaid:row.amt,totalValue:row.amt,
      bookingRef:row.invoiceNum||'',notes:row.memo||'',product:row.product||'',
      supplierId:row.supplierId||'',supplierName:row.supplierName||'',
      invoiceNum:row.invoiceNum||''
    });

    // Link client to supplier
    if(row.supplierId){
      var sup=db.vendors.find(function(v){return v.id===row.supplierId;});
      if(sup&&!(sup.clientIds||[]).includes(cid)){
        if(!sup.clientIds)sup.clientIds=[];
        sup.clientIds.push(cid);
      }
    }

    // Update client revenue
    const newRev=(client.totalRevenue||0)+row.amt;
    db.clients=db.clients.map(c=>c.id===cid?Object.assign({},c,{totalRevenue:newRev}):c);

    imported++;totalRev+=row.amt;
  });
  snapshot('Import trips');
  saveDB();render();
  window._importState=null;
  toast('Imported '+imported+' trips — $'+totalRev.toLocaleString()+(skipped?' ('+skipped+' skipped)':''),'ok');
}

        if(lines.length<2){toast('CSV appears empty','err');return;}
        const headers=lines[0].split(',').map(function(h){return h.replace(/"/g,'').trim().toLowerCase();});

            return (email&&c.email&&c.email.toLowerCase()===email.toLowerCase())||c.name.toLowerCase()===name.toLowerCase();
          });
          if(exists){skipped++;continue;}
          db.clients.push({id:newId('C',db.clients),name:toLastFirst(name),email:email,phone:'',location:'',tier:'Standard',points:0,preferredAirline:'',preferredHotel:'',notes:'',joined:today(),totalTrips:0,notesLog:[]});
          added++;
        }
        snapshot('Import contacts');
        saveDB();render();
        toast('Imported '+added+' contacts'+(skipped?' ('+skipped+' skipped)':'')+' ✓');

function getReportData(){
  var fromDate = (document.getElementById('rpt-from')||{}).value||'';
  var toDate   = (document.getElementById('rpt-to')||{}).value||'';
  var noteType = (document.getElementById('rpt-type')||{}).value||'';
  var clientId = (document.getElementById('rpt-client')||{}).value||'';

  // Collect all notes from all clients
  var rows = [];
  db.clients.forEach(function(c){
    if(clientId && c.id !== clientId) return;
    (c.notesLog||[]).forEach(function(n){
      // Parse note timestamp for date comparison
      var noteDate = '';
      try{ noteDate = new Date(n.ts).toISOString().slice(0,10); }catch(e){}
      if(!noteDate || noteDate === 'NaN-aN-aN'){
        // Try parsing 'Jun 10, 2026 10:52 AM' format
        try{ noteDate = new Date(n.ts).toISOString().slice(0,10); }catch(e){ noteDate = ''; }
      }
      if(fromDate && noteDate < fromDate) return;
      if(toDate   && noteDate > toDate)   return;
      if(!(n.noteType||'')) return; // exclude notes with no type
      if(noteType && (n.noteType||'') !== noteType) return;
      rows.push({
        client: c.name,
        email:  c.email||'',
        ts:     n.ts,
        type:   n.noteType||'',
        text:   n.text||''
      });
    });
  });

  // Sort by timestamp descending
  rows.sort(function(a,b){ return new Date(b.ts)-new Date(a.ts); });
  return rows;
}

function runReport(){
  var rows = getReportData();
  var container = document.getElementById('rpt-results');
  if(!container) return;
  if(!rows.length){
    container.innerHTML = '<div class="empty" style="padding:40px">No notes match the selected filters</div>';
    return;
  }
  var BCLS2 = {'Email Sent':'nt-email-sent','Email Received':'nt-email-received','Initial Call':'nt-initial-call','Follow-up':'nt-follow-up','General':'nt-general','Trip Import':'nt-blue','Text Message':'nt-text-message','Lead':'nt-lead'};
  window._reportRows = rows; // store for click handler
  container.innerHTML =
    '<div style="font-size:13px;color:#888;margin-bottom:10px">'+rows.length+' note'+(rows.length!==1?'s':'')+' found</div>'+
    '<div class="tbl-wrap"><table class="report-table"><thead><tr>'+
      '<th>Client</th><th>Timestamp</th><th>Type</th><th>Note</th>'+
    '</tr></thead><tbody>'+
    rows.map(function(r,ri){
      var badgeCls = BCLS2[r.type]||'nt-general';
      var typeHtml = r.type ? '<span class="note-type-badge '+badgeCls+'">'+r.type+'</span>' : '<span style="color:#aaa">—</span>';
      var preview = r.text.slice(0,200)+(r.text.length>200?'…':'');
      return '<tr style="cursor:pointer" class="rpt-row" data-rpt-idx="'+ri+'">'+
        '<td><div style="font-weight:600;color:#111">'+r.client+'</div><div style="font-size:11px;color:#888">'+r.email+'</div></td>'+
        '<td style="white-space:nowrap;color:#555">'+r.ts+'</td>'+
        '<td>'+typeHtml+'</td>'+
        '<td class="note-cell" style="color:#2563eb;cursor:pointer;text-decoration:underline">'+preview+'</td>'+
      '</tr>';
    }).join('')+
    '</tbody></table></div>';
}

function exportReport(){
  var rows = getReportData();
  if(!rows.length){ toast('No data to export','err'); return; }
  var esc = function(v){ var s=String(v==null?'':v); return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s; };
  var headers = ['Client','Email','Timestamp','Note Type','Note'];
  var csv = [headers].concat(rows.map(function(r){return[r.client,r.email,r.ts,r.type,r.text];})).map(function(r){return r.map(esc).join(',');}).join('\n');
  var b = new Blob([csv],{type:'text/csv'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='milesman-notes-report.csv'; a.click();
  toast('Report exported ✓');
}

// ── Vendor CSV Import ────────────────────────────────────────────────────
// Expected columns (flexible): Name, Type, Category, Contact, Email, Phone, Website, Notes
function importVendorsCSV(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv,.tsv,.txt';
  inp.onchange=function(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=function(ev){
      try{
        const raw=ev.target.result;
        const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
        if(!lines.length){toast('File appears empty','err');return;}

        const delim = lines[0].includes('\t') ? '\t' : ',';
        const split = function(line){
          if(delim===','){ return parseCSVLine(line); }
          return line.split(delim).map(function(c){return c.replace(/^"|"$/g,'').trim();});
        };

        const hdrs = split(lines[0]).map(function(h){return h.toLowerCase().trim();});
        const looksLikeHeader = hdrs.some(function(h){return ['name','date','amount','num','qty','memo','item','class'].includes(h);});
        const startRow = looksLikeHeader ? 1 : 0;

        function getCol(row, names, fallbackIdx){
          if(looksLikeHeader){
            for(var i=0;i<names.length;i++){
              var idx=hdrs.indexOf(names[i]);
              if(idx>=0) return (row[idx]||'').trim();
            }
            return '';
          }
          return (row[fallbackIdx]||'').trim();
        }

        // Same layout as revenue import:
        // col0=date,col1=invoice,col2=memo,col3=name,col4=ship date,col5=item,col6=class,col7=qty,col8=price,col9=amount
        var vendorMap = {}; // name.toLowerCase() -> {name, clientNames:[], rows:[]}

        for(var i=startRow;i<lines.length;i++){
          var cols=split(lines[i]);
          if(cols.length<4) continue;

          var date    = getCol(cols,['date'],0);
          var memo    = getCol(cols,['memo','description'],2);
          var nameVal = getCol(cols,['name'],3);
          var itemVal = getCol(cols,['item'],5);
          var classVal= getCol(cols,['class'],6) || (cols[6]||'').trim();
          var amtStr  = getCol(cols,['amount','sales price'],9) ||
                        getCol(cols,['amount','sales price'],8) ||
                        cols[cols.length-1]||'';
          var amount  = parseFloat(amtStr.replace(/[$,"]/g,''))||0;

          if(!nameVal) continue;

          // Rule: if Name !== Class, Name is treated as a supplier
          var nameLower = nameVal.toLowerCase().trim();
          var classLower = classVal.toLowerCase().trim();
          if(nameLower === classLower || !classVal) continue; // skip - this is a direct client row, not a supplier row

          var key = nameLower;
          if(!vendorMap[key]) vendorMap[key]={name:nameVal, clientNames:[], rows:[]};
          if(classVal && !vendorMap[key].clientNames.includes(classVal)){
            vendorMap[key].clientNames.push(classVal);
          }
          vendorMap[key].rows.push({
            date:date, description:memo, productType:itemVal,
            clientName:classVal, amount:amount
          });
        }

        // Fuzzy match client by name (handles Last,First and First Last)
        function matchClient(cn){
          if(!cn) return null;
          var cLower=cn.toLowerCase().trim();
          var cFirst=getFirstName(cLower);
          var cLast=getLastName(cLower);
          return db.clients.find(function(c){
            var full=(c.name||'').toLowerCase().trim();
            var first=getFirstName(full);
            var last=getLastName(full);
            if(full===cLower) return true;
            if(cFirst&&cLast&&cFirst!==cLast&&first===cFirst&&last===cLast) return true;
            return false;
          });
        }

        var added=0, skipped=0, tripsAdded=0;
        Object.keys(vendorMap).forEach(function(key){
          var vm = vendorMap[key];
          var exists = db.vendors.find(function(v){return(v.name||'').toLowerCase()===key;});
          var clientIds = [];
          vm.clientNames.forEach(function(cn){
            var matched=matchClient(cn);
            if(matched && !clientIds.includes(matched.id)) clientIds.push(matched.id);
          });

          if(exists){
            clientIds.forEach(function(cid){
              if(!(exists.clientIds||[]).includes(cid)){
                if(!exists.clientIds) exists.clientIds=[];
                exists.clientIds.push(cid);
              }
            });
            skipped++;
          } else {
            db.vendors.push({
              id:newId('V',db.vendors),
              name:vm.name,
              type:'Supplier',
              category:'',
              primaryClientName:vm.clientNames[0]||'',
              contactName:'',email:'',phone:'',website:'',notes:'',notesLog:[],
              clientIds:clientIds
            });
            added++;
          }

          vm.rows.forEach(function(row){
            if(!row.clientName) return;
            var client=matchClient(row.clientName);
            if(!client) return;
            if(!client.notesLog) client.notesLog=[];
            var dupKey=(row.date+'|'+vm.name+'|'+row.description).toLowerCase();
            var alreadyImported=client.notesLog.some(function(n){return (n.importKey||'')===dupKey;});
            if(alreadyImported) return;
            var noteText=vm.name+(row.description?' - '+row.description:'')+(row.date?' ('+row.date+')':'')+(row.amount?' $'+row.amount:'');
            client.notesLog.push({ts:new Date().toLocaleString(),text:noteText,noteType:'Trip Import',importKey:dupKey});
            tripsAdded++;
          });
        });

        snapshot('Import suppliers');
        saveDB();render();
        toast('Imported '+added+' supplier'+(added!==1?'s':'')+(skipped?' ('+skipped+' updated)':'')+(tripsAdded?' · '+tripsAdded+' trip notes added':''),'ok');
      }catch(err){console.error(err);toast('Could not read CSV: '+err.message,'err');}
    };r.readAsText(f);
  };inp.click();
}

const VENDOR_TYPES = ['Supplier','Referral Partner','DMC'];
const VENDOR_CATS  = ['Airline','Hotel','Cruise Line','Car Rental','Tour Operator','Other'];

function getVendorStats(vendor){
  var stats = {trips:0, revenue:0, clients:[], tripList:[]};

  // Primary: trips directly linked via supplierId
  db.trips.forEach(function(t){
    var matchSupplier = t.supplierId === vendor.id;
    var matchAir = vendor.category==='Airline' && t.airline && t.airline.toLowerCase()===vendor.name.toLowerCase();
    var matchHot = vendor.category==='Hotel'   && t.hotel   && t.hotel.toLowerCase()===vendor.name.toLowerCase();
    if(matchSupplier || matchAir || matchHot){
      stats.revenue += (t.totalValue||0);
      if(!stats.clients.includes(t.clientName)) stats.clients.push(t.clientName);
      stats.tripList.push(t);
    }
  });

  // Also include trips for linked clients (referral partners without supplierId match)
  (vendor.clientIds||[]).forEach(function(cid){
    var c = db.clients.find(function(x){return x.id===cid;});
    if(c && !stats.clients.includes(c.name)) stats.clients.push(c.name);
    db.trips.forEach(function(t){
      if(t.clientId===cid && !stats.tripList.includes(t)) stats.tripList.push(t);
    });
  });

  // Count distinct invoice numbers (falls back to trip id if no invoice number)
  var seenInvoices = {};
  stats.tripList.forEach(function(t){
    var key = t.invoiceNum || t.id;
    if(!seenInvoices[key]){ seenInvoices[key]=true; stats.trips++; }
  });

  return stats;
}

function saveVendor(id){
  var name = gv('vn');
  if(!name){toast('Supplier name is required','err');return;}
  var clientIds = Array.from(document.querySelectorAll('.vendor-client-cb:checked')).map(function(cb){return cb.value;});
  // Collect notes from form
  var notesLog = [];
  document.querySelectorAll('[id^="vne-"]').forEach(function(el){
    var txt=(el.querySelector('.vnote-txt')||{}).value||'';
    var typ=(el.querySelector('.vnote-type-sel')||{}).value||'';
    var tsEl=el.querySelector('.note-ts');
    if(el.id==='vne-new'){
      if(txt.trim()) notesLog.push({ts:new Date().toLocaleString(),text:txt.trim(),noteType:typ});
    } else {
      if(txt.trim()) notesLog.push({ts:tsEl?tsEl.textContent:'',text:txt.trim(),noteType:typ});
    }
  });
  var data = {
    name:name, type:gv('vtype'), category:gv('vcat'),
    notesLog:notesLog, contactName:gv('vcn'), email:gv('vem'), phone:gv('vph'),
    website:gv('vwb'), notes:gv('vno'), clientIds:clientIds
  };
  if(id){
    db.vendors = db.vendors.map(function(v){return v.id===id ? Object.assign({},v,data) : v;});
    toast('Vendor updated');
  } else {
    data.id = newId('V', db.vendors);
    db.vendors.push(data);
    toast('Vendor added');
  }
  saveDB(); closeModal(); render();
}

function delVendor(id){
  var v = db.vendors.find(function(x){return x.id===id;});
  if(!v || !confirm('Delete vendor '+v.name+'?')) return;
  db.vendors = db.vendors.filter(function(x){return x.id!==id;});
  saveDB(); toast('Vendor deleted'); render();
}

function renderCalendar(){
  var now = window._calDate || new Date();
  window._calDate = now;
  var year = now.getFullYear();
  var month = now.getMonth();
  var monthName = now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var todayStr = new Date().toISOString().slice(0,10);

  // First and last day of month
  var firstDay = new Date(year, month, 1);
  var lastDay  = new Date(year, month+1, 0);
  var startDow = firstDay.getDay(); // 0=Sun

  // Build trip lookup: date -> [{trip, type}]
  var tripMap = {};
  function addToMap(dateStr, trip, type){
    if(!tripMap[dateStr]) tripMap[dateStr] = [];
    tripMap[dateStr].push({trip:trip, type:type});
  }
  db.trips.forEach(function(t){
    if(!t.departDate) return;
    var start = new Date(t.departDate+'T12:00:00');
    var end   = t.returnDate ? new Date(t.returnDate+'T12:00:00') : start;
    var cur   = new Date(start);
    var dayCount = 0;
    while(cur <= end && dayCount < 60){
      var ds = cur.toISOString().slice(0,10);
      var type = cur.getTime()===start.getTime() ? 'start' : (cur.getTime()===end.getTime() ? 'end' : 'span');
      if(start.getTime()===end.getTime()) type='start';
      addToMap(ds, t, type);
      cur.setDate(cur.getDate()+1);
      dayCount++;
    }
  });

  // Build calendar grid HTML
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var headerCells = days.map(function(d){return '<div class="cal-header-cell">'+d+'</div>';}).join('');

  var cells = '';
  // Pad start
  for(var i=0;i<startDow;i++){
    var prevDate = new Date(year, month, -startDow+i+1);
    cells += '<div class="cal-cell other-month"><div class="cal-day-num">'+prevDate.getDate()+'</div></div>';
  }
  // Days of month
  for(var d=1;d<=lastDay.getDate();d++){
    var dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday = dateStr===todayStr;
    var trips   = tripMap[dateStr]||[];
    var dayNumHtml = isToday
      ? '<div class="cal-day-num today-num">'+d+'</div>'
      : '<div class="cal-day-num">'+d+'</div>';
    var tripHtml = trips.slice(0,3).map(function(entry){
      var t=entry.trip, tp=entry.type;
      var cls='cal-trip cal-trip-'+(tp==='start'?'start':tp==='end'?'end':'span');
      var label=(tp==='start'?'▶ ':tp==='end'?'■ ':'  ')+t.clientName+(t.destination?' → '+t.destination.split(',')[0]:'');
      return '<div class="'+cls+'" data-trip-id="'+t.id+'" title="'+t.clientName+': '+t.destination+(tp==='start'?' (departs)':tp==='end'?' (returns)':'')+'">'+label+'</div>';
    }).join('');
    if(trips.length>3) tripHtml+='<div style="font-size:9px;color:#888">+' +(trips.length-3)+' more</div>';
    cells+='<div class="cal-cell'+(isToday?' today':'')+'">'+dayNumHtml+tripHtml+'</div>';
  }
  // Pad end
  var totalCells = startDow + lastDay.getDate();
  var endPad = totalCells % 7 === 0 ? 0 : 7-(totalCells%7);
  for(var i=1;i<=endPad;i++){
    cells+='<div class="cal-cell other-month"><div class="cal-day-num">'+i+'</div></div>';
  }

  $('main').innerHTML =
    '<div class="page-hdr">'+
      '<div class="page-title">Calendar</div>'+
      '<div class="cal-nav">'+
        '<button class="cal-nav-btn" id="cal-prev">&#8592; Prev</button>'+

        '<button class="cal-nav-btn" id="cal-today">Today</button>'+

    '</div>'+
    '<div class="cal-grid">'+headerCells+cells+'</div>';

  // Nav button handlers
  document.getElementById('cal-prev').addEventListener('click',function(){
    window._calDate=new Date(year,month-1,1);renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click',function(){

  });
}

function saveClient(id){
  const name=toLastFirst(gv('fn')),email=gv('fe');
  if(!name||!email){toast('Name and email are required','err');return;}
  snapshot(id?'Edit client':'Add client');
  const entries=Array.from(document.querySelectorAll('.note-entry'));
  var noteEntryEls = Array.from(document.querySelectorAll('.note-entry'));
  const notesLog=noteEntryEls.map(function(el,i){
    const tsEl = el.querySelector('.note-ts-link') || el.querySelector('.note-ts');
    const ts=(tsEl||{}).textContent||'';
    const text=(el.querySelector('.note-txt')||{}).value||'';
    const typeEl=el.querySelector('.note-type-sel');
    const noteType=(typeEl&&typeEl.value)||'';
    return {ts:ts.trim(),text:text.trim(),noteType:noteType};
  }).filter(function(n){return n.text;});
  const data={name:name,email:email,phone:gv('fp'),location:gv('fl'),tier:gv('ft')||'Standard',points:gn('fpts'),preferredAirline:gv('fpa'),preferredHotel:gv('fph'),notesLog:notesLog};
  if(id){
    db.clients=db.clients.map(function(c){return c.id===id?Object.assign({},c,data):c;});
    toast('Client updated');
  }else{
    db.clients.push(Object.assign({},data,{id:newId('C',db.clients),joined:today(),totalTrips:0}));
    toast('Client added');
  }
  saveDB();closeModal();render();
}

function saveTrip(id){
  const clientId=gv('tc'),dest=gv('tde');
  if(!clientId||!dest){toast('Client and destination are required','err');return;}
  snapshot(id?'Edit trip':'Add trip');
  const client=db.clients.find(function(c){return c.id===clientId;});
  const data={clientId:clientId,clientName:client?client.name:'',origin:gv('tor'),destination:dest,departDate:gv('tdd'),returnDate:gv('trd'),status:gv('tst')||'Planning',type:gv('tty')||'Leisure',airline:gv('tai'),flightClass:gv('tcl')||'Economy',hotel:gv('tho'),hotelNights:gn('thn'),pointsUsed:gn('tpu'),cashPaid:gn('tcp'),totalValue:gn('tva'),bookingRef:gv('tbr'),notes:gv('tno')};
  if(id){
    db.trips=db.trips.map(function(t){return t.id===id?Object.assign({},t,data):t;});
    toast('Trip updated');
  }else{
    data.id=newId('T',db.trips);
    db.trips.push(data);
    if(client) client.totalTrips=(client.totalTrips||0)+1;
    toast('Trip added');
  }
  saveDB();closeModal();render();
}

function delClient(id){
  const c=db.clients.find(function(x){return x.id===id;});
  if(!c||!confirm('Delete '+c.name+' and all their trips?'))return;
  snapshot('Delete client: '+c.name);
  db.clients=db.clients.filter(function(x){return x.id!==id;});
  db.trips=db.trips.filter(function(t){return t.clientId!==id;});
  if(selCid===id) selCid=null;
  saveDB();toast('Client deleted');render();
}

function delTrip(id){
  if(!confirm('Delete this trip?'))return;
  snapshot('Delete trip');
  db.trips=db.trips.filter(function(t){return t.id!==id;});
  saveDB();toast('Trip deleted');render();
}

// ── Check for MS OAuth redirect ───────────────────────────────────────────
(function checkMsRedirect(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  const state=params.get('state');
  if(code&&state==='outlooksync'){
    window.history.replaceState({},'',window.location.pathname);
    debugLog('Got auth code, exchanging for token...');
    exchangeCodeForToken(code).then(function(){
      debugLog('Token exchange SUCCESS - auto-syncing emails...');
      toast('Outlook connected - syncing emails...','info');
      $('outlook-btn').style.color='#059669';
      $('outlook-btn').style.borderColor='#6ee7b7';
      // Auto-run sync immediately after login
      syncOutlook();
    }).catch(function(e){
      debugLog('Token exchange FAILED: '+e.message);
      toast('Outlook auth failed: '+e.message,'err');
    });
  }
})();

    toast('Google Drive login reset — tap Backup or Restore to reconnect','ok');
    debugLog('Drive tokens cleared');
  });
  $('btn-ms-signout').addEventListener('click', function(){
    localStorage.removeItem('mm_ms_token');
    localStorage.removeItem('mm_ms_refresh');
    localStorage.removeItem('mm_ms_expiry');
    localStorage.removeItem('mm_last_outlook_sync');
    const btn = document.getElementById('outlook-btn');
    btn.style.color='';btn.style.borderColor='';
    toast('Outlook login reset - click Sync to reconnect','ok');
    debugLog('MS tokens cleared');
  });
  $('btn-debug-toggle').addEventListener('click', function(){
    const p=$('debug-panel');
    p.style.display=p.style.display==='none'?'block':'none';
  });
  $('debug-close').addEventListener('click', function(){$('debug-panel').style.display='none';});
  var neClose = document.getElementById('note-expand-close');
  var neOverlay = document.getElementById('note-expand-overlay');
  if(neClose) neClose.addEventListener('click', closeNoteExpand);
  if(neOverlay) neOverlay.addEventListener('click', function(e){
    if(e.target === neOverlay) closeNoteExpand();
  });
  }catch(e){ console.error('[CRM] Button binding error:', e); }
})();

// ── Note expand ──────────────────────────────────────────────────────────────
function noteTypeCls(t){
  var map={'Email Sent':'nt-email-sent','Email Received':'nt-email-received','Initial Call':'nt-initial-call','Follow-up':'nt-follow-up','General':'nt-general','Trip Import':'nt-blue','Text Message':'nt-text-message','Lead':'nt-lead'};
  return map[t]||'nt-general';
}
function openNoteExpand(ts, text, noteType){
  var overlay = document.getElementById('note-expand-overlay');
  var tsEl    = document.getElementById('note-expand-ts');
  var bodyEl  = document.getElementById('note-expand-body');
  tsEl.innerHTML = ts + (noteType ? ' <span class="note-type-badge '+noteTypeCls(noteType)+'">'+noteType+'</span>' : '');
  bodyEl.textContent = text;
  overlay.classList.add('open');
}
function closeNoteExpand(){
  document.getElementById('note-expand-overlay').classList.remove('open');
}

// ── Auto-save every 5 minutes ────────────────────────────────────────────
function startAutosave(){
  // Local save every 5 minutes
  setInterval(function(){
    saveDB();
    var now = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    console.log('[CRM] Auto-saved locally at', now);
  }, 5 * 60 * 1000);

  // Google Drive backup every 30 minutes (only if already authenticated)
  setInterval(function(){
    if(!driveToken){
      console.log('[CRM] Drive auto-backup skipped - not signed in');
      return;
    }
    console.log('[CRM] Running auto Drive backup...');
    driveBackup(true); // silent=true suppresses the button text change
  }, 30 * 60 * 1000);
}

// ── Boot ──────────────────────────────────────────────────────────────────
console.log('[CRM] Script loaded, binding buttons...');
// Log the full URL so we can see what MS returns
debugLog('Page URL: '+window.location.href.slice(0,200));
debugLog('Search: '+window.location.search);
debugLog('Hash: '+window.location.hash.slice(0,100));
loadDB();
render();
loadDebugLog();
startAutosave();
updateUndoBtn();
checkDriveRedirect();
console.log('[CRM] Ready. Clients:', db.clients.length, 'Trips:', db.trips.length);
</script>
